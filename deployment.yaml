apiVersion: apps/v1
kind: Deployment
metadata:
  name: room-booking-v3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: room-booking
  template:
    metadata:
      labels:
        app: room-booking
    spec:
      containers:
      - name: room-booking-container
        image: jayakumaran/room-booking:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: room-booking-service
spec:
  type: NodePort
  selector:
    app: room-booking
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30001
